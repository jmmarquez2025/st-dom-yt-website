    <script>
      (() => {
        const base = "%BASE_URL%";
        const currentPath = window.location.pathname.startsWith(base)
          ? window.location.pathname.slice(Math.max(0, base.length - 1))
          : window.location.pathname;
        const route = currentPath.replace(/\/$/, "") || "/";
        const heroByRoute = {
          "/": "photos/aerial-interior-opt-1024.webp",
          "/mass-times": "photos/architecture/DSC_0397-opt-1024.webp",
          "/visit": "photos/rose-window-opt-1024.webp",
          "/about": "photos/interior-nave-opt-1024.webp"
        };
        const hero = heroByRoute[route];
        if (!hero) return;
        const link = document.createElement("link");
        link.rel = "preload";
        link.as = "image";
        link.type = "image/webp";
        link.href = `${base}${hero}`;
        link.fetchPriority = "high";
        document.head.appendChild(link);
      })();
    </script>
